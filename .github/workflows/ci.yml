name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable, beta]
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install toolchain
        run: rustup toolchain install ${{ matrix.toolchain }} --profile minimal

      - name: Build
        run: cargo +${{ matrix.toolchain }} build --verbose --all-features

      - name: Test
        run: cargo +${{ matrix.toolchain }} test --verbose --all-features

      - name: Doc
        run: cargo +${{ matrix.toolchain }} doc --verbose --all-features --no-deps

  nightly:
    name: Build & Test (nightly)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install toolchain
        run: rustup toolchain install nightly --profile minimal

      - name: Build
        run: cargo +nightly build --verbose --all-features

      - name: Test
        run: cargo +nightly test --verbose --all-features

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install clippy
        run: |
          rustup toolchain install stable --profile minimal
          rustup component add clippy --toolchain stable

      - name: Clippy
        run: cargo +stable clippy --all-features --all-targets -- -D warnings -A clippy::result_large_err -A clippy::doc_markdown

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install rustfmt
        run: |
          rustup toolchain install stable --profile minimal
          rustup component add rustfmt --toolchain stable

      - name: Check formatting
        run: cargo +stable fmt --all -- --check

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install coverage tooling
        run: |
          rustup toolchain install stable --profile minimal
          rustup component add llvm-tools-preview --toolchain stable
          cargo +stable install cargo-llvm-cov --locked

      - name: Generate coverage
        run: cargo +stable llvm-cov --lcov --output-path lcov.info

      - name: Inspect LCOV paths
        run: grep '^SF:' lcov.info

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          format: lcov
          debug: true

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run audit
        run: cargo audit
